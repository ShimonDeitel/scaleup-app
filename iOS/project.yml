name: Scaleup
options:
  bundleIdPrefix: com.shimondeitel.petweight
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Scaleup:
    type: application
    platform: iOS
    sources:
      - path: Scaleup
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petweight
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Scaleup/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ScaleupTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ScaleupTests
      - path: Scaleup.storekit
    dependencies:
      - target: Scaleup
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petweight.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ScaleupUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ScaleupUITests
    dependencies:
      - target: Scaleup
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petweight.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Scaleup:
    build:
      targets:
        Scaleup: all
        ScaleupTests: [test]
        ScaleupUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Scaleup.storekit
    test:
      config: Debug
      storeKitConfiguration: Scaleup.storekit
      targets:
        - ScaleupTests
        - ScaleupUITests
    archive:
      config: Release
